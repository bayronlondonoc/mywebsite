:root{

*{margin:0;padding:0;box-sizing:border-box}

.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:var(--card);border-radius:14px;padding:26px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tag{display:inline-block;padding:6px 14px;border-radius:99px;font-size:13px;margin:4px 6px 4px 0;background:var(--card);border:1px solid rgba(0,0,0,.1)}
.tag.no{border-color:transparent;background:rgba(0,0,0,.05);color:var(--soft);text-decoration:line-through}
/* HERO */
#hero{min-height:78vh;display:flex;align-items:center;background:var(--primary);color:#fff;border:none}
#hero .inner{padding:120px 0}
#hero .k{font-size:12px;letter-spacing:.3em;text-transform:uppercase;opacity:.65;margin-bottom:22px}
#hero h1{font-size:clamp(48px,9vw,110px);color:#fff}
#hero .tagline{font-size:clamp(17px,2.4vw,24px);opacity:.85;margin-top:18px;font-style:italic;max-width:640px}
#hero .meta{margin-top:56px;font-size:13px;opacity:.55;letter-spacing:.08em}

.swatches{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}

.sw:hover{transform:translateY(-4px)}
.sw b{font-size:15px}
.sw span{font-size:13px;opacity:.85;font-family:monospace}
.sw small{font-size:11.5px;opacity:.7;margin-top:4px}
.combo{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;margin-bottom:10px;background:var(--card)}
.combo .chip{width:46px;height:30px;border-radius:6px;border:1px solid rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.combo.bad{opacity:.7}
.combo.bad .chip{filter:grayscale(.4)}

ul.clean{list-style:none}

/* FOOTER */

@media(max-width:640px){section{padding:60px 0}.wrap{padding:0 20px}}

<script>
(function(){
  const B = BRAND;
  if(!B || !B.brand){ document.getElementById('app').innerHTML='<div class="wrap" style="padding:80px 0"><h2>Sin datos de marca</h2><p class="soft">Reemplaza el objeto BRAND con el JSON de la marca.</p></div>'; return; }

  // ---- Helpers ----
  const esc = s => String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const lum = hex => { const h=(hex||'').replace('#',''); if(h.length<6) return 0;
    const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    return (0.299*r+0.587*g+0.114*b)/255; };
  const inkOn = hex => lum(hex)>0.6 ? '#1A1A1A' : '#FFFFFF';
  const list = (arr,cls='') => (arr||[]).filter(Boolean).map(x=>`<span class="tag ${cls}">${esc(x)}</span>`).join('');
  const li = (arr,fmt) => (arr||[]).map(fmt).join('');

  // ---- CSS vars desde la marca ----
  const c = B.colors||{};
  const R = document.documentElement.style;
  if(c.primary?.hex) R.setProperty('--primary', c.primary.hex);
  if(c.secondary?.[0]?.hex) R.setProperty('--secondary', c.secondary[0].hex);
  if(c.accent_colors?.[0]?.hex) R.setProperty('--accent', c.accent_colors[0].hex);
  const neutrals=c.neutral_colors||[];
  const bgN=neutrals.find(n=>lum(n.hex)>0.85), inkN=neutrals.find(n=>lum(n.hex)<0.3);
  if(bgN) R.setProperty('--bg', bgN.hex);
  if(inkN) R.setProperty('--ink', inkN.hex);

  // ---- Google Fonts dinámico ----
  const ty=B.typography||{};
  const fonts=[ty.primary?.font_name, ty.secondary?.font_name].filter(Boolean);
  if(fonts.length){
    const link=document.createElement('link'); link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?'+fonts.map(f=>'family='+f.trim().replace(/ /g,'+')+':wght@300;400;600;700').join('&')+'&display=swap';
    document.head.appendChild(link);
    if(ty.primary?.font_name) R.setProperty('--font-display', `'${ty.primary.font_name}', serif`);
    if(ty.secondary?.font_name) R.setProperty('--font-body', `'${ty.secondary.font_name}', sans-serif`);
  }
  document.title = `Manual de Marca — ${B.brand.name||''}`;

  // ---- Swatches: todos los colores ----
  const allColors=[];
  if(c.primary?.hex) allColors.push({...c.primary, rol:'Primario'});
  (c.secondary||[]).forEach(x=>x.hex&&allColors.push({...x, rol:'Secundario'}));
  (c.accent_colors||[]).forEach(x=>x.hex&&allColors.push({...x, rol:'Acento'}));
  (c.neutral_colors||[]).forEach(x=>x.hex&&allColors.push({...x, rol:'Neutro'}));
  const swatches = allColors.map(x=>`
    <div class="sw" style="background:${esc(x.hex)};color:${inkOn(x.hex)}" data-hex="${esc(x.hex)}">
      <b>${esc(x.name||x.rol)}</b><span>${esc(x.hex)}</span>
      <small>${esc(x.rol)}${x.meaning?' — '+esc(x.meaning):(x.usage?' — '+esc(x.usage):'')}</small>
    </div>`).join('');

  const combos = (arr,bad)=> (arr||[]).map(x=>`
    <div class="combo ${bad?'bad':''}">
      <div class="chip" style="background:${esc(x.bg)};color:${esc(x.fg)}">Aa</div>
      <div style="font-size:14px">${bad?'✕ ':''}<code>${esc(x.fg)}</code> sobre <code>${esc(x.bg)}</code>
      <span class="soft"> — ${esc(bad?x.reason:x.usage)}</span></div>
    </div>`).join('');

  const collections = (B.collections||[]).filter(x=>x.name).map(x=>`
    <div class="card"><b style="color:var(--primary)">${esc(x.name)}</b>
      <p class="soft" style="margin:6px 0 12px">${esc(x.concept)}</p>
      <div style="display:flex;gap:8px">${(x.palette||[]).map(p=>`<div class="sw" style="background:${esc(p.hex)};color:${inkOn(p.hex)};min-height:64px;flex:1;padding:8px" data-hex="${esc(p.hex)}"><span>${esc(p.hex)}</span></div>`).join('')}</div>
    </div>`).join('');

  const bp=B.brand_personality||{}, voice=bp.brand_voice||{};
  const kv=B.keyvisual||{}, ph=B.photography||{}, msg=B.messaging||{}, apps=B.applications||{}, web=B.web||{}, lg=B.logo||{};
  const appEntries=Object.entries(apps).filter(([k,v])=>v);
  const appNames={business_card:'Tarjeta de presentación',letterhead:'Membrete',email_signature:'Firma de email',video_call_background:'Fondo de videollamada',social_profile:'Perfil de redes',billboard:'Valla / OOH',merchandising:'Merchandising'};

  // ---- Render ----
  document.getElementById('app').innerHTML = `
  <section id="hero"><div class="wrap inner">
    <div class="k">Manual de Identidad de Marca</div>
    <h1>${esc(B.brand.name)}</h1>
    <div class="tagline">${esc(B.brand.tagline)}</div>
    <div class="meta">${esc(B.brand.industry)} · v${esc(B.meta?.version||'1.0')} · ${esc(B.meta?.generated_date||'')} · Documento interno</div>
  </div></section>

  <section><div class="wrap">
    <span class="num">01 · Esencia</span><h2>La marca</h2>
    <p>${esc(B.brand.purpose||B.brand.mission)}</p>
    ${msg.value_proposition?`<blockquote>${esc(msg.value_proposition)}</blockquote>`:''}
    <div class="grid g2" style="margin-top:28px">
      <div class="card"><h3 style="margin-top:0">Cliente ideal</h3><p class="soft">${esc(B.brand.target_market)}</p></div>
      <div class="card"><h3 style="margin-top:0">Arquetipo</h3><p><b>${esc(bp.archetype)}</b>${bp.archetype_secondary?` · secundario: ${esc(bp.archetype_secondary)}`:''}</p>
      <div style="margin-top:10px">${list(bp.human_traits)}</div></div>
    </div>
    ${(B.non_negotiables||[]).length?`<h3>No negociables</h3><ul class="clean">${li(B.non_negotiables,x=>`<li>${esc(x)}</li>`)}</ul>`:''}
  </div></section>

  <section><div class="wrap">
    <span class="num">02 · Voz</span><h2>Cómo hablamos</h2>
    <p class="soft">${esc(voice.communication_style)}</p>
    <div style="margin:16px 0 8px">${list(voice.tone)}</div>
    <div class="voice-cols" style="margin-top:24px">
      <div class="card"><h3 style="margin-top:0">Decimos</h3>${list(voice.words_to_use)}</div>
      <div class="card"><h3 style="margin-top:0">Nunca decimos</h3>${list(voice.words_to_avoid,'no')}</div>
    </div>
    ${msg.whatsapp_greeting?`<h3>Saludo WhatsApp</h3><blockquote>${esc(msg.whatsapp_greeting)}</blockquote>`:''}
  </div></section>

  <section><div class="wrap">
    <span class="num">03 · Color</span><h2>Paleta</h2>
    <p class="soft" style="margin-bottom:24px">Clic en cualquier color para copiar el HEX. Proporción: <b>${esc(c.proportions)}</b></p>
    <div class="swatches">${swatches}</div>
    ${(c.combinations?.approved||[]).length?`<h3>Combinaciones aprobadas</h3>${combos(c.combinations.approved,false)}`:''}
    ${(c.combinations?.prohibited||[]).length?`<h3>Combinaciones prohibidas</h3>${combos(c.combinations.prohibited,true)}`:''}
    ${collections?`<h3>Colecciones con paleta propia</h3><div class="grid g2">${collections}</div>`:''}
  </div></section>

  <section><div class="wrap">
    <span class="num">04 · Tipografía</span><h2>Sistema tipográfico</h2>
    <div class="grid g2">
      <div class="card type-card">
        <span class="soft">Display · ${esc(ty.primary?.usage)}</span>
        <div class="big" style="font-family:var(--font-display)">${esc(ty.primary?.font_name)}</div>
        <div class="alpha" style="font-family:var(--font-display)">AaBbCcDdEeFfGg 0123456789</div>
      </div>
      <div class="card type-card">
        <span class="soft">Body · ${esc(ty.secondary?.usage)}</span>
        <div class="big" style="font-family:var(--font-body)">${esc(ty.secondary?.font_name)}</div>
        <div class="alpha" style="font-family:var(--font-body)">AaBbCcDdEeFfGg 0123456789</div>
      </div>
    </div>
    ${ty.hierarchy?`<ul class="clean" style="margin-top:22px">
      ${li(Object.entries(ty.hierarchy).filter(([k,v])=>v),([k,v])=>`<li><b>${k.toUpperCase()}</b> — ${esc(v)}</li>`)}</ul>`:''}
  </div></section>

  <section><div class="wrap">
    <span class="num">05 · Logo</span><h2>Dirección de logo</h2>
    <div class="grid g2">
      <div class="card"><h3 style="margin-top:0">Concepto</h3><p class="soft">${esc(lg.concept)}</p>
        ${lg.symbolism?`<p class="soft" style="margin-top:10px"><b>Simbolismo:</b> ${esc(lg.symbolism)}</p>`:''}</div>
      <div class="card"><h3 style="margin-top:0">Reglas de uso</h3>
        <ul class="clean">${li(lg.usage_notes,x=>`<li>${esc(x)}</li>`)}</ul></div>
    </div>
  </div></section>

  <section><div class="wrap">
    <span class="num">06 · Fotografía</span><h2>Estilo fotográfico</h2>
    <ul class="clean">
      ${ph.style?`<li><b>Estilo</b> — ${esc(ph.style)}</li>`:''}
      ${ph.lighting?`<li><b>Luz</b> — ${esc(ph.lighting)}</li>`:''}
      ${ph.composition?`<li><b>Composición</b> — ${esc(ph.composition)}</li>`:''}
      ${ph.editing_style?`<li><b>Edición</b> — ${esc(ph.editing_style)}</li>`:''}
      ${ph.color_treatment?`<li><b>Tratamiento de color</b> — ${esc(ph.color_treatment)}</li>`:''}
      ${(ph.avoid||[]).length?`<li><b>Evitar</b> — ${esc((ph.avoid||[]).join(' · '))}</li>`:''}
    </ul>
    ${(ph.subjects||[]).length?`<div style="margin-top:16px">${list(ph.subjects)}</div>`:''}
  </div></section>

  <section class="kv"><div class="wrap">
    <span class="num">07 · Keyvisual</span><h2>La marca en acción</h2>
    <div class="grid g3">
      ${li(kv.post_types,x=>`<div class="card"><b>${esc(x.name)}</b><p class="soft" style="margin-top:8px;font-size:14px">${esc(x.composition)}</p></div>`)}
    </div>
    ${(kv.support_elements||[]).length?`<h3>Elementos de apoyo</h3><div>${list(kv.support_elements)}</div>`:''}
    ${kv.instagram_grid?`<h3>Grid de Instagram</h3><p class="soft">${esc(kv.instagram_grid)}</p>`:''}
  </div></section>

  <section><div class="wrap">
    <span class="num">08 · Aplicaciones</span><h2>Touchpoints</h2>
    <ul class="clean">${li(appEntries,([k,v])=>`<li><b>${esc(appNames[k]||k)}</b> — ${esc(v)}</li>`)}</ul>
  </div></section>

  ${web.ui_style||web.cta_primary?`<section><div class="wrap">
    <span class="num">09 · Web</span><h2>Especificación web</h2>
    <ul class="clean">
      ${web.ui_style?`<li><b>Estilo UI</b> — ${esc(web.ui_style)}</li>`:''}
      ${web.layout_hint?`<li><b>Layout</b> — ${esc(web.layout_hint)}</li>`:''}
      ${(web.effects_hint||[]).length?`<li><b>Efectos</b> — ${esc(web.effects_hint.join(' · '))}</li>`:''}
      ${(web.pages||[]).length?`<li><b>Páginas</b> — ${esc(web.pages.join(' · '))}</li>`:''}
      ${web.cta_primary?`<li><b>CTA principal</b> — ${esc(web.cta_primary)}</li>`:''}
    </ul>
  </div></section>`:''}

  <footer>MANUAL INTERNO DE MARCA · ${esc(B.brand.name)} · No distribuir públicamente<br>
  Generado con el branding skill · Compatible con brand-to-web</footer>`;

  // ---- Copiar HEX ----
  document.addEventListener('click', e=>{
    const sw=e.target.closest('[data-hex]'); if(!sw) return;
    const hex=sw.getAttribute('data-hex');
    (navigator.clipboard?navigator.clipboard.writeText(hex):Promise.reject()).catch(()=>{
      const ta=document.createElement('textarea'); ta.value=hex; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
    });
    const toast=document.getElementById('toast'); toast.textContent=hex+' copiado';
    toast.classList.add('on'); setTimeout(()=>toast.classList.remove('on'),1400);
  });
})();
</script>
</body>
</html>
